---
name: Build runner

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [main]
    paths:
      - "apps/runner/*"
  pull_request:
    branches: [main]
    paths:
      - "apps/runner/*"
      - ".github/workflows/build-runner.yaml"
  merge_group:
    branches: ["main"]

jobs:
  metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: "${{ steps.version.outputs.version }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Extract actions-runner version
        id: version
        run: |
          set -ex

          VERSION="$(grep "FROM docker.io/library/debian" apps/runner/Dockerfile | grep -o -E "[0-9]+\.[0-9]+")"
          echo "version=${VERSION}.$(date +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

  build:
    uses: heathcliff26/ci/.github/workflows/build-container.yaml@main
    needs: metadata
    permissions:
      contents: read
      packages: write
    with:
      app: runner
      tag: "${{ needs.metadata.outputs.version }}"
      dry-run: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
      context: apps/runner
    secrets: inherit

---
name: Test go-fyne-ci

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches: [main]
    paths:
      - "apps/go-fyne-ci/Dockerfile"
      - "apps/go-fyne-ci/test.sh"
      - ".github/workflows/test-go-fyne-ci.yaml"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run test script
        run: apps/go-fyne-ci/test.sh

---
name: Prune ghcr.io

on:
  workflow_dispatch:
    inputs:
      app:
        description: "The name of the app"
        type: string
        required: true
      keep:
        description: "The number of versions to keep"
        type: string
        default: "50"
        required: true
      ignore-versions:
        description: "Versions to ignore"
        type: string
        default: "(latest|rolling)"
        required: false

jobs:
  prune:
    uses: heathcliff26/ci/.github/workflows/prune-ghcr.yaml@42ac7a8dcdf67ef1e18a0082966072cce75a0fe4 # main
    permissions:
      packages: write
    with:
      app: "${{ inputs.app }}"
      keep: "${{ inputs.keep }}"
      ignore-versions: "${{ inputs.ignore-versions }}"

---
name: Build github-actions-runner

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [main]
    paths:
      - "apps/github-actions-runner/Dockerfile"
  pull_request:
    branches: [main]
    paths:
      - "apps/github-actions-runner/Dockerfile"
      - ".github/workflows/build-github-actions-runner.yaml"
  merge_group:
    branches: ["main"]

jobs:
  metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: "${{ steps.version.outputs.version }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract actions-runner version
        id: version
        run: |
          set -ex
          VERSION_STRING="$(grep "FROM ghcr.io/actions/actions-runner" apps/github-actions-runner/Dockerfile)"
          VERSION="$(echo "${VERSION_STRING}" | awk '{print $2}' | awk -F'@' '{print $1}' | awk -F':' '{print $2}')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build:
    uses: heathcliff26/ci/.github/workflows/build-container.yaml@main
    needs: metadata
    permissions:
      contents: read
      packages: write
    with:
      app: github-actions-runner
      tag: "${{ needs.metadata.outputs.version }}"
      dry-run: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
      context: apps/github-actions-runner
    secrets: inherit
